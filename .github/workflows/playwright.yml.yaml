name: Playwright Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Ручной запуск

jobs:
  functional-tests:
    name: Functional Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        browser: [chromium, msedge]
        test-type: [smoke, regression]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
      
      - name: Create .env file
        run: |
          echo "ENV=prod" >> .env
          echo "BASE_URL=https://www.saucedemo.com" >> .env
          echo "AUTH_LOGIN=standard_user" >> .env
          echo "AUTH_PASSWORD=secret_sauce" >> .env
      
      - name: Run ${{ matrix.test-type }} tests
        run: npx playwright test --grep @${{ matrix.test-type }} --project=${{ matrix.browser }}
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results-${{ matrix.browser }}-${{ matrix.test-type }}
          path: playwright-report/
          retention-days: 30

